<div class="page-wrapper" style="align-items: flex-start; padding-top: 40px;">
  <div class="card" style="max-width: 560px;">
    @if (currentQuestion(); as q) {
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div>
          <span style="font-size:0.8rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.08em;">
            Question {{ currentIndex() + 1 }} of {{ questions().length }}
          </span>
        </div>
        <div style="font-family:'Syne',sans-serif; font-weight:800; color:var(--primary);">
          Score: {{ score() }}
        </div>
      </div>

      <div class="progress-bar" style="margin-bottom:28px;">
        <div class="progress-fill" [style.width.%]="progress()"></div>
      </div>

      <h2 style="font-size:1.25rem; font-weight:700; margin-bottom:28px; line-height:1.5;">
        {{ q.text }}
      </h2>

      <div>
        @for (opt of q.options; track opt.id; let i = $index) {
          <button
            class="option-btn"
            [class.selected]="!answered && selectedOptionId === opt.id"
            [class.correct]="answered && opt.id === correctOptionId"
            [class.wrong]="answered && selectedOptionId === opt.id && opt.id !== correctOptionId"
            [disabled]="answered"
            (click)="selectOption(opt)">
            <span class="opt-label">{{ getLabel(i) }}</span>
            {{ opt.text }}
          </button>
        }
      </div>

      @if (answered) {
        <div style="margin-top:16px;">
          <div class="alert" [class.alert-success]="selectedOptionId===correctOptionId" [class.alert-error]="selectedOptionId!==correctOptionId"
            style="margin-bottom:16px;">
            <span>{{ selectedOptionId === correctOptionId ? '✓ Correct!' : '✗ Wrong answer' }}</span>
          </div>
          <button class="btn btn-primary" (click)="next()">
            {{ isLast() ? 'See Results' : 'Next Question →' }}
          </button>
        </div>
      }
    }
  </div>
</div>
