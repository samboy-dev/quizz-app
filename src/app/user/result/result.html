<div class="page-wrapper">
  <div class="card result-card">
    @if (session(); as sess) {
      <div class="result-emoji">{{ getEmoji() }}</div>

      <h1 class="page-title result-title">
        Nice work, <span>{{ sess.name }}!</span>
      </h1>
      <p class="page-subtitle result-subtitle">Quiz completed. Here's how you did.</p>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value text-primary">
            {{ score() }}
          </div>
          <div class="stat-label">Correct Answers</div>
        </div>
        <div class="stat-box">
          <div class="stat-value text-accent">
            {{ percentage }}%
          </div>
          <div class="stat-label">Accuracy</div>
        </div>
      </div>

      <div class="progress-bar result-progress-bar">
        <div class="progress-fill" [style.width.%]="percentage"></div>
      </div>
      <div class="result-total-text">
        {{ score() }} out of {{ sess.totalQuestions }} questions
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" (click)="goToRanking()">🏆 View Leaderboard</button>
        <button class="btn btn-outline" (click)="playAgain()">Play Another Quiz</button>
      </div>
    }
  </div>
</div>
