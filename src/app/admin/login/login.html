<div class="page-wrapper">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div class="brand-name">Quiz<span>Blitz</span></div>
    </div>
    <h1 class="page-title">Admin <span>Login</span></h1>
    <p class="page-subtitle">Access the admin panel to manage quizzes.</p>

    @if (error(); as err) {
      <div class="alert alert-error">⚠ {{ err }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Username</label>
        <input formControlName="username" type="text" placeholder="admin" />
        @if (form.get('username')?.invalid && form.get('username')?.touched) {
          <div class="error-msg">Required</div>
        }
      </div>
      <div class="form-group">
        <label>Password</label>
        <input formControlName="password" type="password" placeholder="••••••••" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <div class="error-msg">Required</div>
        }
      </div>
      <button type="submit" class="btn btn-primary">Login →</button>
    </form>

    <div style="margin-top:20px; text-align:center;">
      <a routerLink="/" style="color:var(--text-muted); font-size:0.85rem;">← Back to Quiz</a>
    </div>
  </div>
</div>
